spring.application.name=order-service

#Server Config
server.servlet.context-path=/api/v1
server.port=9020

#DB Config
spring.datasource.url=jdbc:postgresql://localhost:5432/orderDB
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=create-drop

#spring.jpa.defer-datasource-initialization=true
#spring.sql.init.mode=always
#spring.sql.init.data-location=classpath:data.sql

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

#Resilience 4J config
#retry
resilience4j.retry.instances.inventoryRetry.maxRetryAttempts=3
resilience4j.retry.instances.inventoryRetry.waitDuration=10s

#rateLimiter
resilience4j.ratelimiter.instances.inventoryRateLimiter.limitForPeriod=1
resilience4j.ratelimiter.instances.inventoryRateLimiter.limitRefreshPeriod=5s
resilience4j.ratelimiter.instances.inventoryRateLimiter.timeoutDuration=1s

#circuitBreaker
#Exposes circuit breaker health via the actuators
resilience4j.circuitbreaker.instances.inventoryCircuitBreaker.register-health-indicator=true
#Size of the sliding window for call recording
resilience4j.circuitbreaker.instances.inventoryCircuitBreaker.sliding-window-size=10
#if 50% calls fail. the circuit goes to OPEN state
resilience4j.circuitbreaker.instances.inventoryCircuitBreaker.failure-rate-threshold=50
#Time the circuitestays OPEN before movingto HALF-OPEN
resilience4j.circuitbreaker.instances.inventoryCircuitBreaker.wait-duration-in-open-state=20s
#Number of test calls in Half-OPEN State
resilience4j.circuitbreaker.instances.inventoryCircuitBreaker.permitted-number-of-calls-in-half-open-state=5
#Use COUNT_BASED sliding window
resilience4j.circuitbreaker.instances.inventoryCircuitBreaker.sliding-window-type=COUNT_BASED
#Minimum number of calss before calculating failiure rate
resilience4j.circuitbreaker.instances.inventoryCircuitBreaker.minimum-number-of-calls=5
#Automatic transtion to HALF_OPEN from OPEN as enabled
#resilience4j.circuitbreaker.instances.inventoryCircuitBreaker.automatic-transition-from-open-to-half-open-enabled=true
#Buffer size for event logs
resilience4j.circuitbreaker.instances.inventoryCircuitBreaker.event-consumer-buffer-size=10

#Enabling Actuators
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
